syntax = "proto3";

package linguamesh.protocol.v1;

option java_multiple_files = true;
option java_package = "org.linguamesh.core.protocol";
option java_outer_classname = "LinguaMeshProtocol";

message Envelope {
  uint32 protocol_version = 1;
  string operation_id = 2;
  string correlation_id = 3;
  uint64 sequence = 4;
  string message_type = 5;
  bytes payload = 6;
}

message TranslateTextCommand {
  string endpoint = 1;
  string model_id = 2;
  string source_text = 3;
  string target_locale = 4;
  string secret_ref = 5;
  // 可选的非秘密 OpenAI 组织标识。
  string organization = 6;
  // 可选的非秘密 OpenAI 项目标识。
  string project = 7;
  // 可选的受限非秘密自定义请求头 JSON。
  string custom_headers_json = 8;
}

message TextDeltaEvent {
  string text = 1;
}

message FailureEvent {
  string error_kind = 1;
  string message = 2;
}

message SecretRequiredEvent {
  string request_id = 1;
  string secret_ref = 2;
}

message HostSecretResponse {
  string request_id = 1;
  string resolution = 2;
  string secret = 3;
}

message CompatibilitySnapshot {
  string core_version = 1;
  uint32 abi_major = 2;
  uint32 protocol_version = 3;
  string provider_catalog_version = 4;
  repeated string enabled_features = 5;
}
