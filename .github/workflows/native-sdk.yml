name: Native SDK

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "bindings/**"
      - "contracts/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "tools/*native-sdk*"
      - "tools/*sdk*"
      - ".github/workflows/native-sdk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      # 固定到 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # 固定到 Rust 1.93.0 工具链动作提交。
      - uses: dtolnay/rust-toolchain@d0befba8b9ddf874327619e84c39b094edd58b66
      - run: bash tools/test-native-sdk-fake-provider.sh
      - run: bash tools/test-native-sdk.sh
      - run: bash tools/verify-linux-sdk-package.sh
      # 固定到 actions/upload-artifact v7.0.1。
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linguamesh-linux-sdk-${{ github.sha }}
          path: |
            dist/native-sdk/*.tar.gz
            dist/native-sdk/*.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0

  windows:
    runs-on: windows-2022
    steps:
      # 固定到 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # 固定到 Rust 1.93.0 工具链动作提交。
      - uses: dtolnay/rust-toolchain@d0befba8b9ddf874327619e84c39b094edd58b66
      # 固定到 ilammy/msvc-dev-cmd v1.13.0。
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64
          vsversion: "2022"
      - shell: pwsh
        run: ./tools/test-native-sdk.ps1

  android:
    runs-on: ubuntu-24.04
    steps:
      # 固定到 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # 固定到 actions/setup-java v5.6.0。
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: "17"
      # 固定到 android-actions/setup-android v4.0.1。
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358" "cmake;3.22.1"
      # 固定到 Rust 1.93.0 工具链动作提交。
      - uses: dtolnay/rust-toolchain@d0befba8b9ddf874327619e84c39b094edd58b66
      # 固定到 gradle/actions setup-gradle v6.2.0。
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          gradle-version: "9.5.0"
          cache-provider: basic
      - run: |
          set -euo pipefail
          android_sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "$android_sdk_root" ]]; then
            printf '%s\n' 'Android SDK root is unavailable.' >&2
            exit 1
          fi
          export ANDROID_NDK_HOME="$android_sdk_root/ndk/28.2.13676358"
          bash tools/build-android-sdk.sh
      # 固定到 actions/upload-artifact v7.0.1。
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linguamesh-android-aar-${{ github.sha }}
          path: |
            bindings/android/core/build/outputs/aar/*.aar
            bindings/android/core/build/outputs/aar/SHA256SUMS
            bindings/android/core/build/outputs/aar/build-metadata.json
          if-no-files-found: error
          compression-level: 0

  apple:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      # 固定到 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # 固定到 Rust 1.93.0 工具链动作提交。
      - uses: dtolnay/rust-toolchain@d0befba8b9ddf874327619e84c39b094edd58b66
      - run: bash tools/build-apple-sdk.sh
      - run: swift test --package-path bindings/apple
      # 固定到 actions/upload-artifact v7.0.1。
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: linguamesh-apple-xcframework-${{ github.sha }}
          path: |
            bindings/apple/Artifacts/LinguaMeshCore.xcframework.zip
            bindings/apple/Artifacts/SHA256SUMS
            bindings/apple/Artifacts/LinguaMeshCore.xcframework.zip.swiftpm-checksum
            bindings/apple/Artifacts/build-metadata.json
          if-no-files-found: error
          compression-level: 0
