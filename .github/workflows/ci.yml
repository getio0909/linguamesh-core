name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      # 固定到 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # 固定到 Rust 1.93.0 工具链动作提交。
      - uses: dtolnay/rust-toolchain@d0befba8b9ddf874327619e84c39b094edd58b66
        with:
          components: clippy,rustfmt
      # 固定到 Swatinem/rust-cache v2.9.1。
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-targets --all-features --locked
      - run: cargo build --workspace --locked

  dependencies:
    runs-on: ubuntu-latest
    steps:
      # 固定到 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # 固定到 EmbarkStudios/cargo-deny-action v2.1.1。
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25
        with:
          command: check advisories bans licenses sources

  secrets:
    runs-on: ubuntu-latest
    steps:
      # 固定到 actions/checkout v7.0.0。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan tracked text for credential signatures
        shell: bash
        run: |
          set -euo pipefail
          credential_pattern='(github_[p]at_|[g]hp_[[:alnum:]]{20,}|[s]k-[[:alnum:]_-]{20,}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE [K]EY-----)'
          if git grep -I -nE "$credential_pattern"; then
            printf '%s\n' 'Credential signature detected.' >&2
            exit 1
          fi
          printf '%s\n' 'Credential signature scan passed.'
